<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitChat - Live Messaging</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{url_for('static', path='css/style.css')}}" rel="stylesheet">
</head>

<body>

<!-- Join Screen -->
<div id="joinScreen" class="container vh-100 d-flex align-items-center justify-content-center screen-transition">
    <div class="card simple-card" style="width: 400px;">
        <div class="card-body p-4 text-center">
            <div class="mb-4">
                <span style="font-size: 3rem;">💬</span>
                <h3 class="mt-2 fw-bold text-dark">OrbitChat</h3>
                <p class="text-muted small">Connect instantly and chat in real-time</p>
            </div>

            <div class="mb-4 text-start">
                <label for="username" class="form-label text-secondary small fw-medium">Display Name</label>
                <input
                    type="text"
                    id="username"
                    class="form-control form-control-custom"
                    placeholder="Enter your name"
                    autocomplete="off">
            </div>

            <button
                id="joinBtn"
                class="btn btn-premium w-100 py-2">
                Join Chat
            </button>
        </div>
    </div>
</div>

<!-- Chat Screen -->
<div id="chatScreen" class="container h-100 py-4 d-none screen-transition">
    <div class="row justify-content-center h-100 align-items-center">
        <div class="col-lg-8 col-md-10 h-100 d-flex flex-column" style="min-height: 0;">
            <div class="card simple-card d-flex flex-column h-100" style="min-height: 0;">
                <div class="chat-header">
                    <div class="d-flex align-items-center gap-2">
                        <span style="font-size: 1.25rem;">💬</span>
                        <h5 class="chat-title">Chat Room</h5>
                    </div>
                    <span id="welcomeText" class="user-badge"></span>
                </div>
                <div id="messages" class="messages-container">
                </div>

                <div class="chat-footer">
                    <form onsubmit="sendMessage(event)">
                        <div class="input-group gap-2">
                            <input
                                type="text"
                                id="messageText"
                                class="form-control form-control-custom"
                                placeholder="Type a message..."
                                autocomplete="off">
                            <button class="btn btn-premium">
                                Send
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{url_for('static', path='js/script.js')}}"></script>

</body>
</html>
